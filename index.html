<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>파주시 신호체계 개선</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🚦 파주시 신호체계 개선</h1>

<p>지도를 클릭하여 개선이 필요한 교차로를 선택하세요.</p>

</header>

<div class="container">

    <div class="map-container">

        <img src="images/map.png" id="map">

        <!-- 72번 -->
        <button class="marker"
                id="marker72"
                onclick="toggleSignal(72)">
            72
        </button>

        <!-- 100번 -->
        <button class="marker"
                id="marker100"
                onclick="toggleSignal(100)">
            100
        </button>

    </div>

    <div class="selected-box">

       <h2>📍 좌표 측정기</h2>

    <p>X : <span id="coordX">-</span></p>

    <p>Y : <span id="coordY">-</span></p>

</div>
        <h2>선택한 교차로</h2>

        <ul id="selectedList">

            <li>선택된 교차로가 없습니다.</li>

        </ul>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
